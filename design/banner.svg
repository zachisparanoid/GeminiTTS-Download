<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gemini-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285F4" />
      <stop offset="50%" stop-color="#9B72CB" />
      <stop offset="100%" stop-color="#D96570" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feFlood flood-color="rgba(0,0,0,0.15)" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="white" />
  <rect width="1200" height="400" fill="url(#gemini-gradient)" opacity="0.05" />
  
  <!-- Left Side: Logo -->
  <g transform="translate(100, 50) scale(0.6)">
    <rect width="512" height="512" rx="112" fill="url(#gemini-gradient)" />
    <g filter="url(#shadow)">
      <path d="M256 80C256 177.2 334.8 256 432 256C334.8 256 256 334.8 256 432C256 334.8 177.2 256 80 256C177.2 256 256 177.2 256 80Z" fill="white" />
      <rect x="180" y="230" width="16" height="52" rx="8" fill="#4285F4" opacity="0.8" />
      <rect x="210" y="210" width="16" height="92" rx="8" fill="#4285F4" opacity="0.8" />
      <rect x="240" y="190" width="16" height="132" rx="8" fill="#4285F4" opacity="0.8" />
      <rect x="270" y="200" width="16" height="112" rx="8" fill="#4285F4" opacity="0.8" />
      <rect x="300" y="220" width="16" height="72" rx="8" fill="#4285F4" opacity="0.8" />
    </g>
    <circle cx="400" cy="400" r="70" fill="white" filter="url(#shadow)" />
    <path d="M400 360V420M400 420L375 395M400 420L425 395M370 440H430" stroke="url(#gemini-gradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Right Side: Text -->
  <text x="450" y="180" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="#333">Gemini TTS</text>
  <text x="450" y="260" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="url(#gemini-gradient)">Downloader</text>
  
  <text x="450" y="320" font-family="Arial, sans-serif" font-size="24" fill="#666">Save audio responses from Gemini with one click.</text>
</svg>
